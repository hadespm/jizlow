<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chuyển khoản - JiZ LoW</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>
  <div class="card">

    <div class="logo-box">
      <img src="logo.png" alt="JiZ-N Logo" class="logo">
    </div>

    <div class="service-title">
      <h1>CHUYỂN KHOẢN</h1>
      <p>Vui lòng chuyển khoản đúng nội dung để shop xử lý nhanh hơn</p>
    </div>
    <div class="qr-box">
  <img src="qr-bank.png" alt="QR Chuyển khoản" class="qr-image">
</div>
    <div class="bank-box" style="display: none;">
      <div class="bank-row">
        <span>Ngân hàng</span>
        <strong>TP BANK</strong>
      </div>

      <div class="bank-row">
        <span>Chủ tài khoản</span>
        <strong>HOANG DANH TUONG</strong>
      </div>

      <div class="bank-row">
        <span>Số tài khoản</span>
        <strong id="accountNumber">19193688888</strong>
      </div>

      <div class="bank-row">
        <span>Nội dung CK</span>
        <strong id="transferContent">JIZNSHOP</strong>
      </div>
    </div>

    <button class="btn" onclick="copyAccount()">
      <i class="fa-solid fa-copy"></i> Sao chép số tài khoản
    </button>
<button class="btn" onclick="copyTransferContent()">
  <i class="fa-solid fa-copy"></i> Sao chép nội dung CK
</button>
    <a class="btn" href="https://zalo.me/0355794800" target="_blank">
      <i class="fa-solid fa-headset"></i> Gửi hóa đơn cho shop
    </a>

    <a class="btn back-btn" href="services.html">
      <i class="fa-solid fa-arrow-left"></i> Quay lại
    </a>

    <div class="footer">
      <div>© 2026 JiZ LoW</div>
    </div>

  </div>

  <script>
  function copyAccount() {
    const account = document.getElementById("accountNumber").innerText;
    navigator.clipboard.writeText(account);
    alert("Đã sao chép số tài khoản!");
  }

  function copyTransferContent() {
    const content = document.getElementById("transferContent").innerText;
    navigator.clipboard.writeText(content);
    alert("Đã sao chép nội dung chuyển khoản!");
  }
</script>
</body>
</html>
