<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VIP | JiZ LoW</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="card">

    <div class="logo-box">
        <img src="logo.png" alt="Jz-N Logo" class="logo">
    </div>

    <h1 class="service-title">KHU VỰC VIP</h1>

    <p class="service-subtitle">
        Nhập mật khẩu để xem bảng giá VIP
    </p>

    <div class="vip-box">
        <input type="password" id="vipPassword" placeholder="Nhập mật khẩu VIP" onkeydown="if(event.key==='Enter'){checkVipPassword()}">
        <button class="btn" onclick="checkVipPassword()">
            <i class="fa-solid fa-lock-open"></i> Xác nhận
        </button>
        <p id="vipMessage"></p>
    </div>

    <a class="btn" href="services.html">
        <i class="fa-solid fa-arrow-left"></i> Quay lại
    </a>

    <div class="footer">
        © 2026 JiZ LoW
    </div>

</div>

<script>
const VIP_PASSWORD = "JIZVIP2026";

function checkVipPassword(){

    const input = document.getElementById("vipPassword");
    const message = document.getElementById("vipMessage");

    const pass = input.value.trim();

    if(pass === VIP_PASSWORD){
    sessionStorage.setItem("VIP_UNLOCKED", "true");
    window.location.href = "vip-price.html";
}else{
    message.textContent = "Sai mật khẩu VIP!";
}
}
</script>
</script>

</body>
</html>
